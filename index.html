<!doctype html>

<head>
  <meta charset="UTF-8" />
  <script>
    window.addEventListener('error', function(e) {
      setTimeout(function() {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.zIndex = '99999';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.style.fontSize = '20px';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.innerHTML = '<h2>Global Script Error:</h2>' + e.message + '<br>at ' + e.filename + ':' + e.lineno + ':' + e.colno + '<br><br>Stack:<br>' + (e.error ? e.error.stack : 'N/A');
        document.body.appendChild(div);
      }, 500);
    });
    window.addEventListener('unhandledrejection', function(e) {
      setTimeout(function() {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.zIndex = '99999';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'orange';
        div.style.color = 'black';
        div.style.padding = '20px';
        div.style.fontSize = '20px';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.innerHTML = '<h2>Unhandled Promise Rejection:</h2>' + e.reason + '<br><br>Stack:<br>' + (e.reason && e.reason.stack ? e.reason.stack : 'N/A');
        document.body.appendChild(div);
      }, 500);
    });
  </script>
